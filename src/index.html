<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPC Benchmarking Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Inter-Process Communication Benchmarking</h1>
        </header>

        <section id="configuration">
            <h2>Benchmark Configuration</h2>
            <div class="form-group">
                <label for="ipcMechanism">IPC Mechanism:</label>
                <select id="ipcMechanism">
                    <option value="pipe">Pipe (Simulated)</option>
                    <option value="sharedMemory">Shared Memory (Simulated)</option>
                    <option value="messageQueue">Message Queue (Simulated)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="messageSize">Message Size (Bytes):</label>
                <input type="number" id="messageSize" value="1024">
            </div>
            <div class="form-group">
                <label for="iterations">Iterations:</label>
                <input type="number" id="iterations" value="1000">
            </div>
            <button id="runBenchmark" class="btn btn-primary">Run Benchmark</button>
        </section>

        <section id="results" class="hidden">
            <h2>Benchmark Results</h2>
            <div class="results-display">
                <p><strong>Average Latency:</strong> <span id="latency"></span> ms</p>
                <p><strong>Throughput:</strong> <span id="throughput"></span> Bytes/s</p>
            </div>
        </section>

        <section id="loading" class="hidden">
            <div class="loader"></div>
            <p>Benchmarking in progress...</p>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
